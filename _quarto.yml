project:
  type: book
  output-dir: _book

book:
  title: "Modern Authoring Template"
  author: "Technical Creator"
  chapters:
    - index.qmd
    - introduction.qmd
    - workflow-deepdive.qmd
  appendices:
    - appendix-telemetry.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
  pdf:
    documentclass: scrbook
    classoption: [twoside, openright]
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - top=0.75in
      - bottom=0.75in
      - inner=0.75in
      - outer=0.625in
      - bindingoffset=0.25in
