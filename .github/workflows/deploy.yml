name: Publish Book to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write # Restricted entirely to committing compiled HTML to gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run:
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Quarto Compiler
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Render and Publish Web Book
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOK_FUNNEL_METRIC_KEY: ${{ secrets.REAL_PRODUCTION_API_KEY }}
